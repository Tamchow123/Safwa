services:
  db:
    image: postgres:17-alpine
    container_name: safwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: safwa
      POSTGRES_PASSWORD: safwa_dev_only
      POSTGRES_DB: safwa_dev
    ports:
      - "5432:5432"
    volumes:
      - safwa_postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safwa -d safwa_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  safwa_postgres_data:
